name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# A newer push to the same branch supersedes an in-flight run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Pin the package dir so the cache path is deterministic rather than $HOME-relative.
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-test:
    name: Build & test
    # Windows-only, and not a preference: Caliper.App is WinUI 3
    # (net10.0-windows10.0.19041.0) and Caliper.Core binds winsqlite3.dll via
    # SQLitePCLRaw.bundle_winsqlite3. Neither builds nor runs on ubuntu.
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          # No global.json in the repo, so the SDK version is pinned here.
          dotnet-version: '10.0.x'

      # setup-dotnet's built-in `cache: true` is deliberately not used: it hashes
      # **/packages.lock.json and hard-fails when no lock file exists. This repo has
      # none. Central Package Management means Directory.Packages.props pins every
      # version, so it is the correct cache key instead.
      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Caliper.slnx

      - name: Build
        # TreatWarningsAsErrors=true is already set in Directory.Build.props,
        # so a warning fails this step on its own.
        run: dotnet build Caliper.slnx --no-restore -c Release

      - name: Test
        id: test
        # Caliper.Evals is an Exe with no test SDK: it gets built by the solution
        # build above, and dotnet test correctly runs nothing from it.
        run: dotnet test Caliper.slnx --no-build -c Release --logger trx --results-directory TestResults

      - name: Upload test results
        # Upload when tests fail, but not when an earlier step skipped them -- with no
        # .trx written, if-no-files-found would otherwise mask the real failure.
        if: ${{ !cancelled() && steps.test.outcome != 'skipped' }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/*.trx
          if-no-files-found: error

  aot-publish:
    name: AOT publish (Console)
    # Separate job so the slower native-code step never delays test feedback.
    # Native AOT is a hard project constraint, and trim/AOT breakage surfaces only
    # at publish -- an ordinary build will not catch it.
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-aot-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Publish (win-x64, Native AOT)
        # Requires the MSVC linker; windows-latest ships the VS build tools.
        run: dotnet publish src/Caliper.Console -c Release -r win-x64
